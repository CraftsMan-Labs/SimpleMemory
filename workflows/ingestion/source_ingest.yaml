id: source-ingest
version: 1.0.0

metadata:
  name: "Source Ingestion"
  description: "Parse, segment, chunk, and embed a source document into the knowledge graph storage layer."

entry_node: parse_source

nodes:
  - id: parse_source
    name: "Parse Source"
    node_type:
      custom_worker:
        handler: parse_source
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        source_id: "{{ input.source_id }}"
        source_version_id: "{{ input.source_version_id }}"
        source_type: "{{ input.source_type }}"

  - id: segment_source
    name: "Segment Source"
    node_type:
      custom_worker:
        handler: segment_source
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        source_id: "{{ input.source_id }}"
        source_version_id: "{{ input.source_version_id }}"
        raw_text: "{{ nodes.parse_source.output.raw_text }}"
        page_count: "{{ nodes.parse_source.output.page_count }}"
        metadata: "{{ nodes.parse_source.output.metadata }}"

  - id: create_chunks
    name: "Create Chunks"
    node_type:
      custom_worker:
        handler: create_chunks
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        source_id: "{{ input.source_id }}"
        source_version_id: "{{ input.source_version_id }}"
        segment_ids: "{{ nodes.segment_source.output.segment_ids }}"

  - id: embed_chunks
    name: "Embed Chunks"
    node_type:
      custom_worker:
        handler: embed_chunks
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        source_id: "{{ input.source_id }}"
        chunk_ids: "{{ nodes.create_chunks.output.chunk_ids }}"

edges:
  - from: parse_source
    to: segment_source
  - from: segment_source
    to: create_chunks
  - from: create_chunks
    to: embed_chunks
