id: wiki-generate
version: 1.0.0

metadata:
  name: "Wiki Generation"
  description: "Generate Obsidian-style wiki pages from source chunks, propose internal links, persist, and embed."

entry_node: generate_wiki_pages

nodes:
  - id: generate_wiki_pages
    name: "Generate Wiki Pages"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.4
        heal: true
    config:
      output_schema:
        type: object
        properties:
          wiki_pages:
            type: array
            items:
              type: object
              properties:
                slug:
                  type: string
                title:
                  type: string
                page_type:
                  type: string
                markdown:
                  type: string
                summary:
                  type: string
                evidence_chunk_ids:
                  type: array
                  items:
                    type: string
                confidence:
                  type: number
                reason:
                  type: string
              required: [slug, title, page_type, markdown, summary, evidence_chunk_ids, confidence, reason]
        required: [wiki_pages]
        additionalProperties: false
      user_input_prompt: |
        You are a knowledge management assistant. Given the following source chunks, generate comprehensive wiki pages in Obsidian markdown format.

        Requirements:
        - Create one wiki page per distinct concept, entity, or topic found in the chunks.
        - Use [[Internal Link]] syntax to reference other pages you generate.
        - Each page should have a clear title, a summary, and well-structured markdown body.
        - page_type should be one of: "concept", "entity", "process", "reference", "overview".
        - slug should be lowercase-kebab-case derived from the title.
        - confidence is 0.0-1.0 indicating how well-supported the page is by source evidence.

        Source Chunks (workspace: {{ input.workspace_id }}):
        {% for chunk_id in input.chunk_ids %}
        - Chunk ID: {{ chunk_id }}
        {% endfor %}

        Tenant: {{ input.tenant_id }}
        Source: {{ input.source_id }}

  - id: propose_wiki_links
    name: "Propose Wiki Links"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.3
        heal: true
    config:
      output_schema:
        type: object
        properties:
          wiki_links:
            type: array
            items:
              type: object
              properties:
                from_slug:
                  type: string
                to_slug:
                  type: string
                link_text:
                  type: string
                link_type:
                  type: string
                confidence:
                  type: number
                reason:
                  type: string
              required: [from_slug, to_slug, link_text, link_type, confidence, reason]
        required: [wiki_links]
        additionalProperties: false
      user_input_prompt: |
        Given the following wiki pages that were just generated, propose internal links between them.

        Wiki Pages:
        {% for page in nodes.generate_wiki_pages.output.wiki_pages %}
        - slug: {{ page.slug }}, title: {{ page.title }}, summary: {{ page.summary }}
        {% endfor %}

        Requirements:
        - link_type should be one of: "related", "parent", "child", "see_also", "prerequisite".
        - Only propose links where a meaningful semantic relationship exists.
        - confidence is 0.0-1.0 indicating strength of the relationship.

  - id: persist_wiki
    name: "Persist Wiki"
    node_type:
      custom_worker:
        handler: persist_wiki
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        source_id: "{{ input.source_id }}"
        source_version_id: "{{ input.source_version_id }}"
        wiki_pages: "{{ nodes.generate_wiki_pages.output.wiki_pages }}"
        wiki_links: "{{ nodes.propose_wiki_links.output.wiki_links }}"

  - id: embed_wiki
    name: "Embed Wiki Pages"
    node_type:
      custom_worker:
        handler: embed_wiki
        handler_file: handlers.py
    config:
      payload:
        tenant_id: "{{ input.tenant_id }}"
        workspace_id: "{{ input.workspace_id }}"
        wiki_page_ids: "{{ nodes.persist_wiki.output.wiki_page_ids }}"

edges:
  - from: generate_wiki_pages
    to: propose_wiki_links
  - from: propose_wiki_links
    to: persist_wiki
  - from: persist_wiki
    to: embed_wiki
